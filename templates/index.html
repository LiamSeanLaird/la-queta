{% extends "base.html" %}
{% block title %}La Queta — start{% endblock %}
{% block content %}
<section class="stack-lg">
  <p class="text-muted" style="text-align: center;">
    Pick a handle to save your progress on this device.
  </p>
  <form id="register-form" class="stack">
    <label class="field">
      <span class="field__label">Handle</span>
      <input class="input" id="handle-input" name="handle" type="text" autocomplete="username" placeholder="e.g. liam" required minlength="3" maxlength="24" pattern="[A-Za-z0-9_-]{3,24}">
      <p class="field__error" id="gate-error" hidden></p>
    </label>
    <button type="submit" class="btn btn--primary btn--block">Continue</button>
  </form>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/gate.js') }}"></script>
{% endblock %}
