<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}La Queta{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <main class="page">
    <header class="brand">
      <h1 class="brand__title">
        {% if brand_href %}
          <a class="brand__link" href="{{ brand_href }}">La Queta</a>
        {% else %}
          La Queta
        {% endif %}
      </h1>
      <p class="brand__tagline">{% block tagline %}aprèn català{% endblock %}</p>
    </header>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
